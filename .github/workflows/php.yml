name: PHP CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Lint PHP files
        run: |
          set -e
          mapfile -t files < <(find . -type f -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./asset/vendor/*" \
            -not -path "./assets/vendor/*")

          if [ ${#files[@]} -eq 0 ]; then
            echo "No PHP files found to lint."
            exit 0
          fi

          for file in "${files[@]}"; do
            php -l "$file"
          done
